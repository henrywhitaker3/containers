name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: go-task/setup-task@v1
      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff
      - name: Version container
        run: |
          PARENTS=()
          CHILDREN=()

          for dir in toolkit kubectl; do
            result=$(task version dir="$dir")
            echo "[$dir]: $result"
            if [ "$result" != "skip" ]; then
              entry=$(echo "$result" | jq -c --arg dir "$dir" '. + {dir: $dir}')
              PARENTS+=("$entry")
              git add "$dir/CHANGELOG.md"
              git commit -m "chore(docs): update $dir changelog"
              git push
            fi
          done
          for dir in pipelines k6/statsd k6/disruptor; do
            result=$(task version dir="$dir")
            echo "[$dir]: $result"
            if [ "$result" != "skip" ]; then
              entry=$(echo "$result" | jq -c --arg dir "$dir" '. + {dir: $dir}')
              CHILDREN+=("$entry")
              git add "$dir/CHANGELOG.md"
              git commit -m "chore(docs): update $dir changelog"
              git push
            fi
          done

          echo "parents=[$(
            IFS=,
            echo "${PARENTS[*]}"
          )]" >> "$GITHUB_OUTPUT"
          echo "children=[$(
            IFS=,
            echo "${CHILDREN[*]}"
          )]" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.parents != '[]'
    strategy:
      matrix:
        include: ${{ fromJson(needs.version.outputs.parents) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: ${{ matrix.dir }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.dir }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.dir }}:${{ matrix.version }}

  build-children:
    runs-on: ubuntu-latest
    needs: [build, version]
    if: needs.version.outputs.children != '[]'
    strategy:
      matrix:
        include: ${{ fromJson(needs.version.outputs.children) }}
    steps:
      - uses: actions/checkout@v6
      - name: Tag new version
        run: |
          git tag ${{ matrix.tag }}
          git push origin ${{ matrix.tag }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          context: ${{ matrix.dir }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.dir }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.dir }}:${{ matrix.version }}
