version: "3"

tasks:
  default:
    silent: false
    cmds: ["task -l"]

  build:
    desc: Build a container
    requires:
      vars:
        - dir
    vars:
      platform: '{{ .platform | default "linux/arm64" }}'
    cmds:
      - docker buildx build --pull --platform {{ .platform }} {{ .dir }}

  version:all:
    desc: Run versioning for all containers
    silent: true
    cmds:
      - ./hack/version_all.sh

  version:
    desc: Version the packages
    requires:
      vars:
        - dir
    cmds:
      - ./hack/version.sh {{ .dir }}

  changelog:
    desc: Generate the changelog
    requires:
      vars:
        - dir
    cmds:
      - |
        dir="{{ .dir }}"
        sanitised=$(echo $dir | tr '/' '-')
        git cliff --include-path "$dir/*" --tag-pattern "$sanitised.*" --bump >"$dir/CHANGELOG.md"
